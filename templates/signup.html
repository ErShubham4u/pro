{% extends 'base.html' %}

{% block content %}

<style>
  .signup-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
  }

  .signup-card {
    background: white;
    width: 100%;
    max-width: 450px;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .signup-card h2 {
    text-align: center;
    margin-bottom: 25px;
    color: #1e293b;
  }

  .signup-card form p {
    margin-bottom: 15px;
  }

  .signup-card input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
  }

  .signup-card input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
  }

  .signup-btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #10b981;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .signup-btn:hover {
    background: #059669;
  }

  .signup-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #64748b;
  }

  .signup-footer a {
    color: #3b82f6;
    text-decoration: none;
  }

  .signup-footer a:hover {
    text-decoration: underline;
  }
</style>

<div class="signup-wrapper">
  <div class="signup-card">
    <h2>Create Account</h2>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="signup-btn">Sign Up</button>
    </form>

    <div class="signup-footer">
      Already have an account?
      <a href="/accounts/login/">Login</a>
    </div>
  </div>
</div>

{% endblock %}
