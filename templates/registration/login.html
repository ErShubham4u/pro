{% extends 'base.html' %}

{% block content %}

<style>
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
  }

  .login-card {
    background: white;
    width: 100%;
    max-width: 400px;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
  }

  .login-card h1 {
    text-align: center;
    margin-bottom: 25px;
    color: #1e293b;
  }

  .login-card form p {
    margin-bottom: 15px;
  }

  .login-card input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #cbd5e1;
    font-size: 14px;
  }

  .login-card input:focus {
    outline: none;
    border-color: #3b82f6;
    box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
  }

  .login-btn {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s ease;
  }

  .login-btn:hover {
    background: #2563eb;
  }

  .login-footer {
    text-align: center;
    margin-top: 20px;
    font-size: 14px;
    color: #64748b;
  }

  .login-footer a {
    color: #3b82f6;
    text-decoration: none;
  }

  .login-footer a:hover {
    text-decoration: underline;
  }
</style>

<div class="login-wrapper">
  <div class="login-card">
    <h1>Welcome Back</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="login-footer">
      Don’t have an account?
      <a href="/signup/">Sign Up</a>
    </div>
  </div>
</div>

{% endblock %}
